# Cosmonic Control deployment values for wasmstreet.
#
# Helm values consumed by the cosmonic-labs http-trigger chart, which
# wraps a single WebAssembly component as a Cosmonic Control HTTPTrigger.
#
# wasmstreet ships as one composed component (built from eight upstream
# Rust + C++ components, linked together with `wac plug` at build time):
#   - Exports wasi:http/incoming-handler — the chart routes ingress
#     traffic to it.
#   - Imports wasi:http/outgoing-handler — the inner market-data and
#     ticker-search components call out to Yahoo Finance for live spot
#     prices and ticker autocomplete fallback.
#
# Outbound network access is scoped to query1.finance.yahoo.com via
# localResources.allowedHosts. wasi:logging is declared so component
# diagnostics surface through the host's logging pipeline.
#
# The chart also pulls in wasi:http/incoming-handler implicitly because
# this deployment IS an HTTPTrigger; only outbound interfaces and other
# capability imports need to be declared explicitly here.
#
# Install with:
#   helm install wasmstreet \
#     oci://ghcr.io/cosmonic-labs/charts/http-trigger \
#     -f manifests/values.http-trigger.yaml
#
# Reach the deployed app via the runtime gateway (matches `ingress.host`):
#   curl -H 'Host: wasmstreet.localhost.cosmonic.sh' http://<gateway-host>/
#
# For the 'http-trigger' helm chart
components:
  - name: wasmstreet
    image: ghcr.io/cosmonic-labs/wasmstreet:0.1.0
    localResources:
      # market-data and ticker-search components reach out to Yahoo
      # Finance for live spot prices and ticker autocomplete fallback.
      allowedHosts:
        - "https://query1.finance.yahoo.com"

ingress:
  host: "wasmstreet.localhost.cosmonic.sh"

hostInterfaces:
  - namespace: wasi
    package: http
    version: "0.2.8"
    interfaces:
      - outgoing-handler
  - namespace: wasi
    package: logging
    version: 0.1.0-draft
    interfaces:
      - logging
